  <path d="M42 50 C42 50 36 46 37 39 C37.5 35 40 33 40 33 C40 33 39.5 37 42 38 C42 38 40.5 34 43 31 C43 31 43.5 36 46 37 C48 38 49 40 49 43 C49 47 46 50 42 50 Z"
