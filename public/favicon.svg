  <!-- Inner flame -->
  <path d="M42 48 C42 48 39 46 39.5 42.5 C39.8 40.5 41.5 39.5 41.5 39.5 C41.5 39.5 41.5 41.5 43 42 C43 42 43 48 42 48 Z"
